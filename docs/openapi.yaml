components:
  schemas:
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    DataEnvelope:
      type: object
      required:
        - data
      properties:
        data: {}
    ListEnvelope:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          type: object
          additionalProperties: true
    AttachmentUploadRequest:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
    ticqex_create_ticketRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      oneOf:
        - type: object
          properties:
            title:
              type: string
              minLength: 1
            status_id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
            assignee_id:
              anyOf:
                - type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                - type: "null"
            origin:
              type: string
              enum:
                - manual
                - api
                - email
            tags:
              type: array
              items:
                type: string
            custom_fields:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
            kind:
              type: string
              const: task
            body:
              type: string
            contact: {}
          required:
            - title
            - kind
            - contact
          additionalProperties: false
        - type: object
          properties:
            kind:
              type: string
              const: conversation
            title:
              type: string
              minLength: 1
            contact_address:
              type: string
              format: email
              pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
            message:
              type: object
              properties:
                body:
                  type: string
                  minLength: 1
              required:
                - body
              additionalProperties: false
            status_id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
            assignee_id:
              anyOf:
                - type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                - type: "null"
            tags:
              type: array
              items:
                type: string
            custom_fields:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
          required:
            - kind
            - title
            - contact_address
            - message
          additionalProperties: false
    ticqex_update_ticketRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        title:
          type: string
          minLength: 1
        body:
          anyOf:
            - type: string
            - type: "null"
        status_id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
        assignee_id:
          anyOf:
            - type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
            - type: "null"
        tags:
          type: array
          items:
            type: string
        custom_fields:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      additionalProperties: false
    ticqex_create_ticket_messageRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        body:
          type: string
          minLength: 1
        channel:
          type: string
          enum:
            - email
            - api
            - admin
        email:
          type: object
          properties:
            cc:
              type: array
              items:
                type: string
                format: email
                pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
            subject:
              type: string
            reply_all:
              type: boolean
            include_quote:
              type: boolean
            attachment_upload_ids:
              type: array
              items:
                type: string
                format: uuid
                pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          additionalProperties: false
      required:
        - body
      additionalProperties: false
    ticqex_create_ticket_commentRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 32000
      required:
        - body
      additionalProperties: false
    ticqex_update_ticket_commentRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 32000
      required:
        - body
      additionalProperties: false
    ticqex_create_ticket_draftRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        body:
          type: string
          minLength: 1
        channel:
          type: string
          enum:
            - email
